            if (!studentData[mssv]) {
                es.style.display = 'none';
                rc.innerHTML = '<div class="error-message">Không tìm thấy sinh viên với MSSV: <strong>' + mssv + '</strong><br><small>Hãy kiểm tra lại mã số sinh viên (ví dụ: 255098857)</small></div>';
                return;
            }
            
            var s = studentData[mssv];
            es.style.display = 'none';
            
            var h = '<div class="student-header"><h2>' + s.name + '</h2><p><strong>MSSV:</strong> ' + mssv + '</p></div>';
            
            h += '<div class="score-card"><h3>TỔNG ĐIỂM</h3><div class="score-summary">';
            h += '<div class="summary-item"><div class="summary-label">Excel</div><div class="summary-value">' + s.excel.total.toFixed(1) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">Word</div><div class="summary-value">' + s.word.total.toFixed(1) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">PowerPoint</div><div class="summary-value">' + s.ppt.total.toFixed(1) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">Tổng Cộng</div><div class="summary-value">' + s.total.toFixed(1) + '</div></div>';
            h += '</div></div>';
            
            h += renderCard('CÂU 1: EXCEL (3.5 điểm)', s.excel.items, s.excel.total);
            h += renderCard('CÂU 2: WORD (3.5 điểm)', s.word.items, s.word.total);
            h += renderCard('CÂU 3: POWERPOINT (3.0 điểm)', s.ppt.items, s.ppt.total);
            
            rc.innerHTML = h;
        }
        
        function renderCard(title, items, total) {
            var h = '<div class="score-card"><h3>' + title + '</h3><div class="criteria-list">';
            
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var status = item.score === 0 ? 'zero' : (item.score < item.max_score ? 'partial' : 'full');
                
                h += '<div class="criteria-item ' + status + '">';
                h += '<div class="criteria-label"><span>' + item.criterion + '</span>';
                h += '<span class="criteria-score">' + item.score.toFixed(2) + ' / ' + item.max_score.toFixed(2) + '</span></div>';
                if (item.feedback && item.feedback !== '–') {
                    h += '<div class="criteria-feedback">' + item.feedback + '</div>';
                }
                h += '</div>';
            }
            
            h += '</div>';
            h += '<div class="section-total"><span style="font-size:12px;color:#666;">Tổng: </span><span style="font-size:18px;font-weight:bold;">' + total.toFixed(1) + '</span></div>';
            h += '</div>';
            return h;
        }
        
        document.getElementById('mssv-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchStudent();
        });
    </script>
</body>
</html>
