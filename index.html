        function r1(v) { return (Math.round(v * 10) / 10).toFixed(1); }
        function r2(v) { return (Math.round(v * 100) / 100).toFixed(2); }

        function searchStudent() {
            var mssv = document.getElementById('mssv-input').value.trim();
            var rc = document.getElementById('result-container');
            var es = document.getElementById('empty-state');
            
            if (!mssv) { es.style.display = 'block'; rc.innerHTML = ''; return; }
            
            if (!studentData[mssv]) {
                es.style.display = 'none';
                rc.innerHTML = '<div class="error-message">Không tìm thấy sinh viên với MSSV: <strong>' + mssv + '</strong><br><small>Hãy kiểm tra lại mã số sinh viên.</small></div>';
                return;
            }
            
            var s = studentData[mssv];
            es.style.display = 'none';
            
            var h = '<div class="student-header"><h2>' + s.name + '</h2><p>MSSV: ' + mssv + '</p></div>';
            
            h += '<div class="score-card"><h3>Tổng điểm</h3><div class="score-summary">';
            h += '<div class="summary-item"><div class="summary-label">Excel</div><div class="summary-value">' + r1(s.excel.total) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">Word</div><div class="summary-value">' + r1(s.word.total) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">PowerPoint</div><div class="summary-value">' + r1(s.ppt.total) + '</div></div>';
            h += '<div class="summary-item"><div class="summary-label">Tổng cộng</div><div class="summary-value">' + r1(s.total) + '</div></div>';
            h += '</div></div>';
            
            h += renderCard('Câu 1 – Excel (3.5 điểm)', s.excel.items, s.excel.total);
            h += renderCard('Câu 2 – Word (3.5 điểm)', s.word.items, s.word.total);
            h += renderCard('Câu 3 – PowerPoint (3.0 điểm)', s.ppt.items, s.ppt.total);
            
            rc.innerHTML = h;
        }
        
        function renderCard(title, items, total) {
            var h = '<div class="score-card"><h3>' + title + '</h3><div class="criteria-list">';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var status = item.score === 0 ? 'zero' : (item.score < item.max_score ? 'partial' : 'full');
                h += '<div class="criteria-item ' + status + '">';
                h += '<div class="criteria-label"><span>' + item.criterion + '</span>';
                h += '<span class="criteria-score">' + r2(item.score) + ' / ' + r2(item.max_score) + '</span></div>';
                if (item.feedback && item.feedback !== '–') {
                    h += '<div class="criteria-feedback">' + item.feedback + '</div>';
                }
                h += '</div>';
            }
            h += '</div>';
            h += '<div class="section-total"><span style="font-size:12px;color:#888;">Tổng: </span><span style="font-size:18px;font-weight:bold;">' + r1(total) + '</span></div>';
            h += '</div>';
            return h;
        }
        
        document.getElementById('mssv-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchStudent();
        });
